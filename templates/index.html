<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrocitrico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="container">
            <nav class="navbar">
                <a class="logo" href="/" aria-label="Inicio AgroCítrico">
                    <img src="{{ url_for('static', filename='img/agrocitrico_logo.svg') }}" alt="Logo de AgroCítrico">
                </a>
                <ul class="nav-links">
                    <li><a class="active" href="#nosotros">Nosotros</a></li>
                    <li><a href="#mision-vision">Misión y visión</a></li>
                    <li><a href="#objetivos">Objetivos</a></li>
                    <li><a href="#tecnologias">Tecnologías</a></li>
                </ul>
                <a class="cta" href="#contacto">Contáctanos</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero" id="nosotros">
            <div class="container hero-grid">
                <div class="hero-content">
                    <span class="hero-kicker">AGROCÍTRICO</span>
                    <h1>Gestión clara para cultivos cítricos más productivos</h1>
                    <p>
                        Centraliza el seguimiento del cultivo, organiza datos clave de campo y toma decisiones con información precisa en un solo flujo de trabajo.
                    </p>
                    <a class="hero-action" href="#tecnologias">Ver tecnologías</a>
                </div>
                <figure class="hero-media">
                    <img src="https://images.unsplash.com/photo-1605000797499-95a51c5269ae?auto=format&fit=crop&w=1200&q=80" alt="Cultivo cítrico con frutos en producción">
                </figure>
            </div>
