<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <!-- Background -->
  <rect width="300" height="120" fill="white" rx="12"/>

  <!-- Lemon body -->
  <ellipse cx="55" cy="55" rx="28" ry="22" fill="#F9E04B" stroke="#E8C820" stroke-width="2"/>
  <!-- Lemon tip left -->
  <ellipse cx="28" cy="55" rx="7" ry="5" fill="#F9E04B" stroke="#E8C820" stroke-width="1.5"/>
  <!-- Lemon tip right -->
  <ellipse cx="82" cy="55" rx="7" ry="5" fill="#F9E04B" stroke="#E8C820" stroke-width="1.5"/>

  <!-- Leaf -->
  <path d="M55 33 Q72 18 80 28 Q70 38 55 33Z" fill="#4CAF50" stroke="#388E3C" stroke-width="1.2"/>
  <!-- Leaf vein -->
  <line x1="55" y1="33" x2="74" y2="24" stroke="#388E3C" stroke-width="0.8"/>

  <!-- Inner lemon highlight -->
  <ellipse cx="46" cy="48" rx="8" ry="6" fill="#FFF176" opacity="0.6"/>

  <!-- Text: AgroCítrico -->
  <text x="105" y="52" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#2E7D32">Agro</text>
  <text x="168" y="52" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#F9A825">Cítrico</text>

  <!-- Tagline -->
  <text x="105" y="72" font-family="Arial, sans-serif" font-size="11" fill="#888">Gestión inteligente del cultivo</text>

  <!-- Divider line -->
  <line x1="105" y1="58" x2="272" y2="58" stroke="#E0E0E0" stroke-width="1"/>
</svg>